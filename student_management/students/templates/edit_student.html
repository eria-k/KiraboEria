<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="name"
        value="{{ student.name }}"
    >

    <input
        type="number"
        name="age"
        value="{{ student.age }}"
    >

    <input
        type="text"
        name="course"
        value="{{ student.course }}"
    >

    <button>Update</button>

</form>
